name: Build Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'export/**'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Build docs export
        run: |
          mintlify export
          rm -rf export/
          unzip -o export.zip -d export/
          rm export.zip

      - name: Commit updated export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add export/
          git diff --cached --quiet || git commit -m "chore: rebuild docs export [skip ci]"
          git push
